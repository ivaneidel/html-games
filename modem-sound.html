<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sound Link PRO</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:monospace;
  text-align:center;
}
#ui { padding:15px; }

#log, #bits {
  font-size:11px;
  max-height:160px;
  overflow:auto;
  background:#111;
  padding:10px;
  margin-top:10px;
  white-space:pre-wrap;
}
</style>
</head>
<body>

<div id="ui">
  <button onclick="startSender()">Sender</button>
  <button onclick="startReceiver()">Receiver</button>
  <div id="progress"></div>
</div>

<div id="bits">Idle</div>
<div id="log"></div>

<script>
// ===== CONFIG =====
const BASE = 800;
const STEP = 120;
const SYMBOL_BITS = 4;
const SYMBOL_TIME = 35; // slightly faster
const THRESHOLD = 120;
const CHANGE_THRESHOLD = 60; // Hz change to detect new symbol

const PREAMBLE = "10101010101010101010101010101010";

// ===== LOG =====
const logEl = document.getElementById("log");
function log(m){
  logEl.innerHTML += m + "<br>";
  logEl.scrollTop = logEl.scrollHeight;
}

// ===== UTILS =====
function strToBits(str){
  return str.split("").map(c =>
    c.charCodeAt(0).toString(2).padStart(8,"0")
  ).join("");
}

function bitsToStr(bits){
  let out="";
  for(let i=0;i<bits.length;i+=8){
    out+=String.fromCharCode(parseInt(bits.slice(i,i+8),2));
  }
  return out;
}

function buildPayload(str){
  const data = strToBits(str);
  const len = data.length.toString(2).padStart(32,"0");
  return PREAMBLE + len + data;
}

// ===== SENDER =====
async function startSender(){
  const msg = prompt("Message", "HELLO WORLD");
  if(!msg) return;

  log("⏳ 3s delay...");
  await sleep(3000);

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const bits = buildPayload(msg);

  const progress = document.getElementById("progress");

  for(let i=0;i<bits.length;i+=SYMBOL_BITS){
    const chunk = bits.slice(i,i+SYMBOL_BITS).padEnd(SYMBOL_BITS,"0");
    const value = parseInt(chunk,2);
    const freq = BASE + value * STEP;

    const osc = audioCtx.createOscillator();
    osc.type="sine";
    osc.frequency.value = freq;

    osc.connect(audioCtx.destination);
    osc.start();

    await sleep(SYMBOL_TIME);
    osc.stop();

    progress.innerText =
      `Sending ${Math.floor(i/bits.length*100)}%`;
  }

  log("📤 Done");
}

// ===== RECEIVER =====
async function startReceiver(){
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);

  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;

  source.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  let buffer="";
  let synced=false;
  let expectedLen=null;

  let lastFreq = 0;
  let lastValue = null;

  log("🎧 Listening...");

  function loop(){
    analyser.getByteFrequencyData(data);

    let maxVal = 0;
    let index = 0;

    for(let i=0;i<data.length;i++){
      if(data[i] > maxVal){
        maxVal = data[i];
        index = i;
      }
    }

    if(maxVal < THRESHOLD){
      document.getElementById("bits").innerText = "No signal...";
      requestAnimationFrame(loop);
      return;
    }

    const freq = index * audioCtx.sampleRate / (data.length * 2);

    // ===== SMOOTHING =====
    const smoothFreq = lastFreq * 0.7 + freq * 0.3;

    const value = Math.round((smoothFreq - BASE) / STEP);

    if(value < 0 || value > 15){
      requestAnimationFrame(loop);
      return;
    }

    // ===== EDGE DETECTION =====
    const freqDiff = Math.abs(smoothFreq - lastFreq);

    if(freqDiff > CHANGE_THRESHOLD && value !== lastValue){

      const bits = value.toString(2).padStart(4,"0");
      buffer += bits;

      lastValue = value;

      // ===== SYNC =====
      if(!synced && buffer.includes(PREAMBLE)){
        log("📡 Sync locked");
        buffer = buffer.split(PREAMBLE)[1];
        synced=true;
      }

      // ===== LENGTH =====
      if(synced && !expectedLen && buffer.length>=32){
        expectedLen = parseInt(buffer.slice(0,32),2);
        buffer = buffer.slice(32);
        log("📏 Bits expected: " + expectedLen);
      }
    }

    lastFreq = smoothFreq;

    // ===== LIVE DECODE =====
    let decoded = "";
    let usableBits = buffer;

    if(expectedLen){
      usableBits = buffer.slice(0, expectedLen);
    }

    const fullBytes = Math.floor(usableBits.length / 8) * 8;
    decoded = bitsToStr(usableBits.slice(0, fullBytes));

    document.getElementById("bits").innerText =
`Signal OK
Freq: ${Math.floor(smoothFreq)} Hz
Value: ${value}

Decoded (live):
${decoded}

Bits:
${buffer.slice(-200)}`;

    // ===== DONE =====
    if(expectedLen && buffer.length >= expectedLen){
      log("📥 FINAL: " + decoded);
      stream.getTracks().forEach(t=>t.stop());
      return;
    }

    requestAnimationFrame(loop);
  }

  loop();
}

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms));
}
</script>

</body>
</html>
