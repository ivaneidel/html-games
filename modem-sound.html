<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DTMF Sound Link</title>

<style>
body {
  background:black;
  color:white;
  font-family:monospace;
  text-align:center;
  margin:0;
}
#ui { padding:15px; }
#log, #bits {
  font-size:12px;
  max-height:160px;
  overflow:auto;
  background:#111;
  padding:10px;
  margin-top:10px;
  white-space:pre-wrap;
}
</style>
</head>
<body>

<div id="ui">
  <button onclick="send()">Sender</button>
  <button onclick="receive()">Receiver</button>
</div>

<div id="bits"></div>
<div id="log"></div>

<script>
// ===== DTMF MAP =====
const DTMF = {
  "1":[697,1209],"2":[697,1336],"3":[697,1477],"A":[697,1633],
  "4":[770,1209],"5":[770,1336],"6":[770,1477],"B":[770,1633],
  "7":[852,1209],"8":[852,1336],"9":[852,1477],"C":[852,1633],
  "*":[941,1209],"0":[941,1336],"#":[941,1477],"D":[941,1633]
};

const SYMBOLS = Object.keys(DTMF);

// ===== UTILS =====
function strToHex(str){
  return [...str].map(c =>
    c.charCodeAt(0).toString(16).padStart(2,"0")
  ).join("");
}

function hexToStr(hex){
  let out="";
  for(let i=0;i<hex.length;i+=2){
    out+=String.fromCharCode(parseInt(hex.slice(i,i+2),16));
  }
  return out;
}

// ===== SENDER =====
async function send(){
  const msg = prompt("Message","HELLO");
  if(!msg) return;

  const hex = strToHex(msg);

  const ctx = new AudioContext();

  function playTone(f1,f2){
    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();

    o1.frequency.value=f1;
    o2.frequency.value=f2;

    o1.connect(ctx.destination);
    o2.connect(ctx.destination);

    o1.start();
    o2.start();

    return [o1,o2];
  }

  await sleep(1000);

  // START
  let tones = playTone(...DTMF["A"]);
  await sleep(300);
  tones.forEach(o=>o.stop());

  for(let c of hex){
    const symbol = SYMBOLS[parseInt(c,16)];
    tones = playTone(...DTMF[symbol]);
    await sleep(120);
    tones.forEach(o=>o.stop());
    await sleep(40);
  }

  // END
  tones = playTone(...DTMF["D"]);
  await sleep(300);
  tones.forEach(o=>o.stop());
}

// ===== RECEIVER =====
async function receive(){
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  const ctx = new AudioContext();
  const src = ctx.createMediaStreamSource(stream);

  const analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;
  src.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  let collecting=false;
  let hex="";

  function detect(){
    analyser.getByteFrequencyData(data);

    let peaks = [];

    for(let i=0;i<data.length;i++){
      if(data[i] > 150){
        peaks.push(i * ctx.sampleRate / (data.length*2));
      }
    }

    let best=null;

    for(let key in DTMF){
      const [f1,f2]=DTMF[key];

      const match1 = peaks.some(p=>Math.abs(p-f1)<40);
      const match2 = peaks.some(p=>Math.abs(p-f2)<40);

      if(match1 && match2){
        best = key;
        break;
      }
    }

    if(best){

      if(best==="A"){
        collecting=true;
        hex="";
        log("🚀 START");
      }
      else if(best==="D"){
        log("🏁 END");
        log("📥 "+hexToStr(hex));
        stream.getTracks().forEach(t=>t.stop());
        return;
      }
      else if(collecting){
        hex += SYMBOLS.indexOf(best).toString(16);
      }

      document.getElementById("bits").innerText =
        "HEX:\n"+hex+"\n\nTEXT:\n"+hexToStr(hex);
    }

    requestAnimationFrame(detect);
  }

  detect();
}

// ===== LOG =====
function log(m){
  const el=document.getElementById("log");
  el.innerHTML += m+"<br>";
  el.scrollTop=el.scrollHeight;
}

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms));
}
</script>

</body>
</html>
