<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pong P2P QR Debug</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:monospace;
  overflow:hidden;
  touch-action:none;
}

#ui { padding:15px; }
canvas { display:none; }
video { width:100%; display:none; }

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  background:white;
  color:black;
  border:none;
}

#log {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  min-height:50px;
  max-height:200px;
  overflow:auto;
  background:#000;
  font-size:11px;
  border-top:1px solid #333;
  display:block; /* 👈 visible by default */
}
</style>
</head>
<body>

<div id="ui">
  <button onclick="host()">Host</button>
  <button onclick="join()">Join</button>
  <button onclick="toggleLog()">Toggle Debug</button>

  <div id="qr"></div>
  <video id="cam" autoplay></video>
</div>

<canvas id="game"></canvas>
<div id="log"></div>

<!-- LIBS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
onload="log('✅ QR lib loaded')"
onerror="log('❌ QR lib failed')"></script>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"
onload="log('✅ jsQR loaded')"
onerror="log('❌ jsQR failed')"></script>

<script>
// --- LOG ---
const logEl = document.getElementById("log");

function log(msg){
  const t = new Date().toLocaleTimeString();
  logEl.innerHTML += `[${t}] ${msg}<br>`;
  logEl.scrollTop = logEl.scrollHeight;
}

function toggleLog(){
  logEl.style.display = logEl.style.display === "none" ? "block" : "none";
}

log("🚀 Script started");

// --- ERROR CAPTURE ---
window.onerror = (m,s,l,c)=>log(`❌ JS Error: ${m} @${l}:${c}`);
window.onunhandledrejection = e=>log(`❌ Promise: ${e.reason}`);

// --- WEBRTC ---
let pc, dc, isHost=false;

function setup(){
  log("🟡 Creating PeerConnection");

  pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  pc.onicecandidate = e=>{
    if(e.candidate){
      log("🧊 ICE candidate");
    } else {
      log("✅ ICE gathering COMPLETE");
    }
  };

  pc.onicegatheringstatechange = ()=>{
    log("📡 ICE gathering: " + pc.iceGatheringState);
  };

  pc.oniceconnectionstatechange = ()=>{
    log("🧊 ICE state: " + pc.iceConnectionState);
  };

  pc.onconnectionstatechange = ()=>{
    log("🔗 Connection: " + pc.connectionState);
  };

  pc.ondatachannel = e=>{
    log("📡 Data channel RECEIVED");
    dc = e.channel;
    setupDC();
  };
}

function setupDC(){
  dc.onopen = ()=>{
    log("🟢 Data channel OPEN");
    startGame();
  };

  dc.onmessage = e=>{
    handle(JSON.parse(e.data));
  };
}

// --- HOST ---
async function host(){
  try {
    log("🚀 HOST clicked");
    isHost=true;
    setup();

    log("📡 Creating data channel");
    dc = pc.createDataChannel("g");
    setupDC();

    log("📝 Creating offer");
    const offer = await pc.createOffer();

    log("📌 Setting local description");
    await pc.setLocalDescription(offer);

    log("📤 Waiting for ICE to finish...");

    // show QR continuously
    setInterval(()=>{
      if(pc.localDescription){
        showQR(JSON.stringify(pc.localDescription));
      }
    },500);

  } catch(e){
    log("❌ Host error: " + e);
  }
}

// --- JOIN ---
async function join(){
  try {
    log("🤝 JOIN clicked");
    setup();
    startCamera();
  } catch(e){
    log("❌ Join error: " + e);
  }
}

// --- QR ---
function showQR(data){
  log("📦 Generating QR");
  const el = document.getElementById("qr");
  el.innerHTML="";
  new QRCode(el, data);
}

// --- CAMERA ---
async function startCamera(){
  try {
    log("📷 Starting camera");

    const video=document.getElementById("cam");
    video.style.display="block";

    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"environment"}
    });

    video.srcObject = stream;

    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");

    const scan = setInterval(()=>{
      if(video.videoWidth === 0) return;

      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;

      ctx.drawImage(video,0,0);

      const img=ctx.getImageData(0,0,canvas.width,canvas.height);
      const code=jsQR(img.data,canvas.width,canvas.height);

      if(code){
        log("📥 QR scanned");
        clearInterval(scan);

        video.srcObject.getTracks().forEach(t=>t.stop());
        video.style.display="none";

        connect(code.data);
      }
    },300);

  } catch(e){
    log("❌ Camera error: " + e);
  }
}

// --- CONNECT ---
async function connect(data){
  try {
    log("🔗 Connecting...");

    const offer=JSON.parse(data);

    await pc.setRemoteDescription(offer);
    log("📥 Remote description set");

    const answer=await pc.createAnswer();
    await pc.setLocalDescription(answer);

    log("📤 Answer created");

    showQR(JSON.stringify(pc.localDescription));

  } catch(e){
    log("❌ Connect error: " + e);
  }
}

// --- GAME ---
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let W,H;
let player={x:0};
let opponent={x:0};
let targetX=0;

let ball={x:0,y:0,vx:0,vy:0,speed:300};

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
}
addEventListener("resize",resize);

function startGame(){
  log("🎮 START GAME");

  document.getElementById("ui").style.display="none";
  canvas.style.display="block";

  resize();
  player.x=W/2;
  opponent.x=W/2;

  if(isHost) resetBall();

  requestAnimationFrame(loop);
}

// --- INPUT ---
canvas.addEventListener("touchmove",e=>{
  const x=e.touches[0].clientX;
  player.x=x;
  send({t:"p",x});
});

// --- NETWORK ---
function send(d){
  if(dc?.readyState==="open"){
    dc.send(JSON.stringify(d));
  }
}

function handle(d){
  if(d.t==="p") targetX=d.x;
  if(d.t==="b") ball=d.ball;
}

// --- GAME ---
function resetBall(){
  ball.x=W/2;
  ball.y=H/2;

  const a=(Math.random()*Math.PI/3)-(Math.PI/6);
  const dir=Math.random()>0.5?1:-1;

  ball.vx=Math.sin(a);
  ball.vy=Math.cos(a)*dir;
}

function update(dt){
  opponent.x += (targetX - opponent.x)*10*dt;

  if(!isHost) return;

  ball.x+=ball.vx*ball.speed*dt;
  ball.y+=ball.vy*ball.speed*dt;

  if(ball.x<0||ball.x>W) ball.vx*=-1;

  if(ball.y>H-40 && Math.abs(ball.x-player.x)<60){
    ball.vy*=-1;
  }

  if(ball.y<40 && Math.abs(ball.x-opponent.x)<60){
    ball.vy*=-1;
  }

  send({t:"b",ball});
}

// --- DRAW ---
function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle="white";

  ctx.fillRect(player.x-60,H-30,120,10);
  ctx.fillRect(opponent.x-60,20,120,10);

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
  ctx.fill();
}

// --- LOOP ---
let last=0;
function loop(t){
  const dt=(t-last)/1000;
  last=t;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
