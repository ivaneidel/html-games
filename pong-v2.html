<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pong P2P</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:monospace;
  overflow:hidden;
  touch-action:none;
}
#ui { padding:15px; }
canvas { display:none; }

video {
  width:100%;
  display:none;
}
</style>
</head>
<body>

<div id="ui">
  <button onclick="host()">Host</button>
  <button onclick="join()">Join</button>

  <div id="qr"></div>
  <video id="cam" autoplay></video>
</div>

<canvas id="game"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
let pc, dc, isHost=false;
let opponentTargetX=0;
let opponentX=0;

// --- WEBRTC ---
function setup() {
  pc = new RTCPeerConnection();

  pc.onicecandidate = e=>{
    if(!e.candidate){
      if(isHost) showQR(JSON.stringify(pc.localDescription));
    }
  };

  pc.ondatachannel = e=>{
    dc=e.channel;
    setupDC();
  };
}

function setupDC(){
  dc.onopen=()=>startGame();
  dc.onmessage=e=>handle(JSON.parse(e.data));
}

async function host(){
  isHost=true;
  setup();

  dc = pc.createDataChannel("g");
  setupDC();

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
}

async function join(){
  setup();
  startCamera();
}

// --- QR ---
function showQR(data){
  document.getElementById("qr").innerHTML="";
  new QRCode(document.getElementById("qr"), data);
}

async function startCamera(){
  const video=document.getElementById("cam");
  video.style.display="block";

  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  video.srcObject=stream;

  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  setInterval(()=>{
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);

    try{
      const img=ctx.getImageData(0,0,canvas.width,canvas.height);
      const code=jsQR(img.data,canvas.width,canvas.height);

      if(code){
        connect(code.data);
        video.srcObject.getTracks().forEach(t=>t.stop());
        video.style.display="none";
      }
    }catch{}
  },300);
}

// --- CONNECT ---
async function connect(data){
  const offer=JSON.parse(data);
  await pc.setRemoteDescription(offer);

  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);

  showQR(JSON.stringify(answer));
}

// --- GAME ---
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
let W,H;

let player={x:0};
let opponent={x:0};

let ball={x:0,y:0,vx:0,vy:0,speed:300};

let score={me:0,them:0};
let paused=false;

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
}
addEventListener("resize",resize);

function startGame(){
  document.getElementById("ui").style.display="none";
  canvas.style.display="block";

  resize();
  player.x=W/2;
  opponent.x=W/2;

  if(isHost) resetBall();

  requestAnimationFrame(loop);
}

// --- INPUT ---
canvas.addEventListener("touchmove",e=>{
  const x=e.touches[0].clientX;
  player.x=x;
  send({t:"p",x});
});

// --- NETWORK ---
function send(d){
  if(dc?.readyState==="open") dc.send(JSON.stringify(d));
}

function handle(d){
  if(d.t==="p") opponentTargetX=d.x;
  if(d.t==="b") ball=d.ball;
  if(d.t==="s") score=d.score;
  if(d.t==="r") resetBall();
}

// --- GAME LOGIC ---
function resetBall(){
  paused=true;

  ball.x=W/2;
  ball.y=H/2;
  ball.speed=300;

  const a=(Math.random()*Math.PI/3)-(Math.PI/6);
  const dir=Math.random()>0.5?1:-1;

  ball.vx=Math.sin(a);
  ball.vy=Math.cos(a)*dir;

  setTimeout(()=>paused=false,800);

  send({t:"r"});
}

function update(dt){
  // smooth opponent
  opponentX += (opponentTargetX - opponentX) * 10 * dt;
  opponent.x = opponentX;

  if(!isHost || paused) return;

  ball.x+=ball.vx*ball.speed*dt;
  ball.y+=ball.vy*ball.speed*dt;

  if(ball.x<0||ball.x>W) ball.vx*=-1;

  // bottom paddle (me)
  if(ball.y>H-40 && Math.abs(ball.x-player.x)<60){
    hit(player.x,-1);
  }

  // top paddle (them)
  if(ball.y<40 && Math.abs(ball.x-opponent.x)<60){
    hit(opponent.x,1);
  }

  if(ball.y<0){
    score.me++;
    send({t:"s",score});
    resetBall();
  }

  if(ball.y>H){
    score.them++;
    send({t:"s",score});
    resetBall();
  }

  send({t:"b",ball});
}

function hit(px,dir){
  const offset=(ball.x-px)/60;
  const angle=offset*Math.PI/3;

  ball.speed*=1.05;
  ball.vx=Math.sin(angle);
  ball.vy=Math.cos(angle)*dir;

  if(navigator.vibrate) navigator.vibrate(10);
}

// --- DRAW ---
function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle="white";

  // paddles
  ctx.fillRect(player.x-60,H-30,120,10);
  ctx.fillRect(opponent.x-60,20,120,10);

  // ball
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
  ctx.fill();

  // score
  ctx.textAlign="center";
  ctx.font="20px monospace";
  ctx.fillText(score.them,W/2,40);
  ctx.fillText(score.me,W/2,H-10);
}

// --- LOOP ---
let last=0;
function loop(t){
  const dt=(t-last)/1000;
  last=t;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}
</script>

<!-- QR SCANNER LIB -->
<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

</body>
</html>
