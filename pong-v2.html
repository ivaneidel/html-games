<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pong P2P Debug</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:monospace;
  overflow:hidden;
  touch-action:none;
}
#ui { padding:15px; }
canvas { display:none; }

textarea {
  width:100%;
  height:90px;
  background:#111;
  color:white;
  border:1px solid #333;
  margin-top:5px;
}

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  background:white;
  color:black;
  border:none;
}

#log {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  max-height:150px;
  overflow:auto;
  background:#000;
  font-size:10px;
  border-top:1px solid #333;
}
</style>
</head>
<body>

<div id="ui">
  <button onclick="host()">1️⃣ Host Game</button>
  <button onclick="join()">1️⃣ Join Game</button>

  <p>📤 Send this:</p>
  <textarea id="out"></textarea>
  <button onclick="copyOut()">Copy</button>

  <p>📥 Paste received:</p>
  <textarea id="in"></textarea>
  <button onclick="processSignal()">Process</button>
</div>

<canvas id="game"></canvas>
<div id="log"></div>

<script>
// --- LOG ---
function log(msg){
  const el=document.getElementById("log");
  el.innerHTML += msg + "<br>";
  el.scrollTop = el.scrollHeight;
}

// --- GLOBAL ERROR CAPTURE ---
window.onerror = function(message, source, lineno, colno, error) {
  log(`❌ JS Error: ${message} @${lineno}:${colno}`);
};

window.onunhandledrejection = function(event) {
  log(`❌ Promise Error: ${event.reason}`);
};

// --- WEBRTC ---
let pc, dc, isHost=false;

function setup(){
  try {
    log("🟡 Creating RTCPeerConnection...");
    pc = new RTCPeerConnection();

    pc.onicecandidate = e=>{
      if(!e.candidate){
        log("✅ ICE gathering complete");
        out.value = JSON.stringify(pc.localDescription);
      } else {
        log("🧊 ICE candidate...");
      }
    };

    pc.onconnectionstatechange = ()=>{
      log("🔗 Connection: " + pc.connectionState);
    };

    pc.oniceconnectionstatechange = ()=>{
      log("🧊 ICE state: " + pc.iceConnectionState);
    };

    pc.ondatachannel = e=>{
      log("📡 Data channel received");
      dc = e.channel;
      setupDC();
    };

  } catch(err){
    log("❌ setup error: " + err);
  }
}

function setupDC(){
  try {
    dc.onopen = ()=>{
      log("🟢 Data channel open");
      startGame();
    };

    dc.onmessage = e=>{
      log("⬇️ " + e.data);
      handle(JSON.parse(e.data));
    };

  } catch(err){
    log("❌ setupDC error: " + err);
  }
}

// --- SIGNALING ---
async function host(){
  try {
    log("🚀 Host clicked");

    isHost=true;
    setup();

    log("📡 Creating data channel...");
    dc = pc.createDataChannel("g");
    setupDC();

    log("📝 Creating offer...");
    const offer = await pc.createOffer();

    log("📌 Setting local description...");
    await pc.setLocalDescription(offer);

    log("📤 Offer ready (waiting ICE)...");
  } catch (err) {
    log("❌ Host error: " + err);
  }
}

async function join(){
  try {
    log("🤝 Join clicked");
    setup();
  } catch(err){
    log("❌ Join error: " + err);
  }
}

async function processSignal(){
  try {
    const data = JSON.parse(in.value);

    if(data.type==="offer"){
      log("📥 Received offer");

      await pc.setRemoteDescription(data);

      log("📝 Creating answer...");
      const answer = await pc.createAnswer();

      await pc.setLocalDescription(answer);

      log("📤 Answer ready (waiting ICE)");
    } else {
      log("📥 Received answer");
      await pc.setRemoteDescription(data);
    }
  } catch(err){
    log("❌ processSignal error: " + err);
  }
}

function copyOut(){
  navigator.clipboard.writeText(out.value);
  log("📋 Copied to clipboard");
}

// --- GAME ---
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let W,H;
let opponentTargetX=0;
let opponentX=0;

let player={x:0};
let opponent={x:0};

let ball={x:0,y:0,vx:0,vy:0,speed:300};

let score={me:0,them:0};
let paused=false;

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
}
addEventListener("resize",resize);

function startGame(){
  log("🎮 Game started");

  document.getElementById("ui").style.display="none";
  canvas.style.display="block";

  resize();
  player.x=W/2;
  opponent.x=W/2;

  if(isHost) resetBall();

  requestAnimationFrame(loop);
}

// --- INPUT ---
canvas.addEventListener("touchmove",e=>{
  const x=e.touches[0].clientX;
  player.x=x;
  send({t:"p",x});
});

// --- NETWORK ---
function send(d){
  if(dc?.readyState==="open"){
    dc.send(JSON.stringify(d));
    log("⬆️ " + JSON.stringify(d));
  }
}

function handle(d){
  if(d.t==="p") opponentTargetX=d.x;
  if(d.t==="b") ball=d.ball;
  if(d.t==="s") score=d.score;
  if(d.t==="r") resetBall();
}

// --- GAME LOGIC ---
function resetBall(){
  paused=true;

  ball.x=W/2;
  ball.y=H/2;
  ball.speed=300;

  const a=(Math.random()*Math.PI/3)-(Math.PI/6);
  const dir=Math.random()>0.5?1:-1;

  ball.vx=Math.sin(a);
  ball.vy=Math.cos(a)*dir;

  setTimeout(()=>paused=false,800);

  send({t:"r"});
}

function update(dt){
  opponentX += (opponentTargetX - opponentX) * 10 * dt;
  opponent.x = opponentX;

  if(!isHost || paused) return;

  ball.x+=ball.vx*ball.speed*dt;
  ball.y+=ball.vy*ball.speed*dt;

  if(ball.x<0||ball.x>W) ball.vx*=-1;

  if(ball.y>H-40 && Math.abs(ball.x-player.x)<60){
    hit(player.x,-1);
  }

  if(ball.y<40 && Math.abs(ball.x-opponent.x)<60){
    hit(opponent.x,1);
  }

  if(ball.y<0){
    score.me++;
    send({t:"s",score});
    resetBall();
  }

  if(ball.y>H){
    score.them++;
    send({t:"s",score});
    resetBall();
  }

  send({t:"b",ball});
}

function hit(px,dir){
  const offset=(ball.x-px)/60;
  const angle=offset*Math.PI/3;

  ball.speed*=1.05;
  ball.vx=Math.sin(angle);
  ball.vy=Math.cos(angle)*dir;

  if(navigator.vibrate) navigator.vibrate(10);
}

// --- DRAW ---
function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle="white";

  ctx.fillRect(player.x-60,H-30,120,10);
  ctx.fillRect(opponent.x-60,20,120,10);

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
  ctx.fill();

  ctx.textAlign="center";
  ctx.font="20px monospace";
  ctx.fillText(score.them,W/2,40);
  ctx.fillText(score.me,W/2,H-10);
}

// --- LOOP ---
let last=0;
function loop(t){
  const dt=(t-last)/1000;
  last=t;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
