<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pong Optical MAX</title>

<style>
body { margin:0; background:black; color:white; font-family:monospace; text-align:center;}
#ui { padding:15px; }
canvas { display:none; }
video { width:100%; display:none; }

#flash {
  width:100vw;
  height:40vh;
  display:none;
}

#progress { margin-top:10px; }

#log {
  position:fixed;
  bottom:0;
  width:100%;
  min-height:50px;
  max-height:200px;
  overflow:auto;
  background:#000;
  font-size:11px;
}
</style>
</head>
<body>

<div id="ui">
  <button onclick="host()">Host</button>
  <button onclick="join()">Join</button>
  <div id="progress"></div>
</div>

<div id="flash"></div>
<video id="cam" autoplay></video>
<canvas id="game"></canvas>
<div id="log"></div>

<script>
// --- CONFIG ---
const GRID = 6; // 6x6 grid = 36 bits per frame
const FRAME_BITS = GRID * GRID;
const PREAMBLE = "10101010101010101010101010101010";

// --- LOG ---
const logEl = document.getElementById("log");
function log(m){ logEl.innerHTML+=m+"<br>"; logEl.scrollTop=logEl.scrollHeight; }

// --- BIT UTILS ---
function strToBits(str){
  return str.split("").map(c =>
    c.charCodeAt(0).toString(2).padStart(8,"0")
  ).join("");
}
function bitsToStr(bits){
  let out="";
  for(let i=0;i<bits.length;i+=8){
    out+=String.fromCharCode(parseInt(bits.slice(i,i+8),2));
  }
  return out;
}

// --- PROTOCOL ---
function buildPayload(str){
  const data = strToBits(str);
  const len = data.length.toString(2).padStart(32,"0");
  return PREAMBLE + len + data;
}

// --- FLASH GRID ---
async function flashData(str){
  const bits = buildPayload(str);
  const flash = document.getElementById("flash");
  const progress = document.getElementById("progress");

  flash.style.display="block";

  let i=0;

  while(i < bits.length){
    const chunk = bits.slice(i, i+FRAME_BITS).padEnd(FRAME_BITS,"0");

    flash.innerHTML="";
    flash.style.display="grid";
    flash.style.gridTemplateColumns = `repeat(${GRID},1fr)`;
    flash.style.gridTemplateRows = `repeat(${GRID},1fr)`;

    for(let b of chunk){
      const div=document.createElement("div");
      div.style.background = b==="1" ? "white" : "black";
      flash.appendChild(div);
    }

    i += FRAME_BITS;
    progress.innerText = `Sending: ${Math.floor(i/bits.length*100)}%`;

    await sleep(16);
  }

  flash.style.display="none";
  progress.innerText="Send done";
}

// --- RECEIVE ---
async function receiveData(){
  const video = document.getElementById("cam");
  const progress = document.getElementById("progress");

  video.style.display="block";

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject=stream;

  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  let bits="";
  let found=false;
  let expectedLen=null;

  return new Promise(resolve=>{
    const loop=setInterval(()=>{
      if(video.videoWidth===0) return;

      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;

      ctx.drawImage(video,0,0);

      const cellW = canvas.width / GRID;
      const cellH = canvas.height / GRID;

      let chunk="";

      for(let y=0;y<GRID;y++){
        for(let x=0;x<GRID;x++){

          const cx = Math.floor((x+0.5)*cellW);
          const cy = Math.floor((y+0.5)*cellH);

          const pixel = ctx.getImageData(cx,cy,1,1).data;

          const luminance = (pixel[0] + pixel[1] + pixel[2]) / 3;

          chunk += luminance > 128 ? "1" : "0";
        }
      }

      bits += chunk;

      // --- SYNC ---
      if(!found && bits.includes(PREAMBLE)){
        log("📡 Sync locked");
        bits = bits.split(PREAMBLE)[1];
        found=true;
      }

      // --- LENGTH ---
      if(found && expectedLen===null && bits.length>=32){
        expectedLen = parseInt(bits.slice(0,32),2);
        bits = bits.slice(32);
        log("📏 Expect bits: "+expectedLen);
      }

      // --- PROGRESS ---
      if(expectedLen!==null){
        progress.innerText = `Receiving: ${Math.floor(bits.length/expectedLen*100)}%`;

        if(bits.length >= expectedLen){
          clearInterval(loop);

          stream.getTracks().forEach(t=>t.stop());
          video.style.display="none";

          log("📥 Done");

          const dataBits = bits.slice(0,expectedLen);
          resolve(bitsToStr(dataBits));
        }
      }

    },16);
  });
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// --- WEBRTC ---
let pc, dc, isHost=false;

function setup(){
  pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  pc.ondatachannel = e=>{
    dc=e.channel;
    setupDC();
  };
}

function setupDC(){
  dc.onopen = ()=>{
    log("🟢 Connected");
    startGame();
  };

  dc.onmessage = e=>{
    handle(JSON.parse(e.data));
  };
}

// --- HOST ---
async function host(){
  isHost=true;
  setup();

  dc = pc.createDataChannel("g");
  setupDC();

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await sleep(500);
  await flashData(JSON.stringify(pc.localDescription));

  log("📡 Waiting answer...");
  const answerStr = await receiveData();

  await pc.setRemoteDescription(JSON.parse(answerStr));
}

// --- JOIN ---
async function join(){
  setup();

  const offerStr = await receiveData();
  await pc.setRemoteDescription(JSON.parse(offerStr));

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  await sleep(500);
  await flashData(JSON.stringify(pc.localDescription));
}

// --- GAME (unchanged) ---
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let W,H;
let player={x:0};
let opponent={x:0};
let targetX=0;

let ball={x:0,y:0,vx:0,vy:0,speed:300};

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
}
addEventListener("resize",resize);

function startGame(){
  document.getElementById("ui").style.display="none";
  canvas.style.display="block";

  resize();
  player.x=W/2;
  opponent.x=W/2;

  if(isHost) resetBall();

  requestAnimationFrame(loop);
}

canvas.addEventListener("touchmove",e=>{
  const x=e.touches[0].clientX;
  player.x=x;
  send({t:"p",x});
});

function send(d){
  if(dc?.readyState==="open"){
    dc.send(JSON.stringify(d));
  }
}

function handle(d){
  if(d.t==="p") targetX=d.x;
  if(d.t==="b") ball=d.ball;
}

function resetBall(){
  ball.x=W/2;
  ball.y=H/2;

  const a=(Math.random()*Math.PI/3)-(Math.PI/6);
  const dir=Math.random()>0.5?1:-1;

  ball.vx=Math.sin(a);
  ball.vy=Math.cos(a)*dir;
}

function update(dt){
  opponent.x += (targetX - opponent.x)*10*dt;

  if(!isHost) return;

  ball.x+=ball.vx*ball.speed*dt;
  ball.y+=ball.vy*ball.speed*dt;

  if(ball.x<0||ball.x>W) ball.vx*=-1;

  if(ball.y>H-40 && Math.abs(ball.x-player.x)<60){
    ball.vy*=-1;
  }

  if(ball.y<40 && Math.abs(ball.x-opponent.x)<60){
    ball.vy*=-1;
  }

  send({t:"b",ball});
}

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle="white";

  ctx.fillRect(player.x-60,H-30,120,10);
  ctx.fillRect(opponent.x-60,20,120,10);

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
  ctx.fill();
}

let last=0;
function loop(t){
  const dt=(t-last)/1000;
  last=t;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
