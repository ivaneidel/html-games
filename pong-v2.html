<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pong P2P Debug FIXED</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:monospace;
}
#ui { padding:15px; }

textarea {
  width:100%;
  height:90px;
  background:#111;
  color:white;
  border:1px solid #333;
  margin-top:5px;
}

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  background:white;
  color:black;
  border:none;
}

#log {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  max-height:150px;
  overflow:auto;
  background:#000;
  font-size:11px;
  border-top:1px solid #333;
}
</style>
</head>
<body>

<div id="ui">
  <button onclick="host()">Host Game</button>
  <button onclick="join()">Join Game</button>

  <p>📤 Send this:</p>
  <textarea id="out"></textarea>
  <button onclick="copyOut()">Copy</button>

  <p>📥 Paste received:</p>
  <textarea id="in"></textarea>
  <button onclick="processSignal()">Process</button>

  <button onclick="log('BUTTON OK')">Test Log</button>
</div>

<div id="log"></div>

<script>
// ✅ CONFIRM JS IS RUNNING
alert("JS LOADED");

// --- DOM ---
const out = document.getElementById("out");
const input = document.getElementById("in");
const logEl = document.getElementById("log");

// --- LOG ---
function log(msg){
  try {
    if (!logEl) {
      alert("LOG FAIL: " + msg);
      return;
    }
    logEl.innerHTML += msg + "<br>";
    logEl.scrollTop = logEl.scrollHeight;
  } catch (e) {
    alert("LOG ERROR: " + msg);
  }
}

// --- GLOBAL ERROR CAPTURE ---
window.onerror = function(message, source, lineno, colno) {
  log(`❌ JS Error: ${message} @${lineno}:${colno}`);
};

window.onunhandledrejection = function(event) {
  log(`❌ Promise Error: ${event.reason}`);
};

// --- WEBRTC ---
let pc, dc, isHost=false;

function setup(){
  try {
    log("🟡 Creating RTCPeerConnection...");
    pc = new RTCPeerConnection();

    pc.onicecandidate = e=>{
      if(!e.candidate){
        log("✅ ICE complete");
        out.value = JSON.stringify(pc.localDescription);
      } else {
        log("🧊 ICE candidate...");
      }
    };

    pc.onconnectionstatechange = ()=>{
      log("🔗 Connection: " + pc.connectionState);
    };

    pc.oniceconnectionstatechange = ()=>{
      log("🧊 ICE state: " + pc.iceConnectionState);
    };

    pc.ondatachannel = e=>{
      log("📡 Data channel received");
      dc = e.channel;
      setupDC();
    };

  } catch(err){
    log("❌ setup error: " + err);
  }
}

function setupDC(){
  try {
    dc.onopen = ()=>{
      log("🟢 Data channel open");
    };

    dc.onmessage = e=>{
      log("⬇️ " + e.data);
    };

  } catch(err){
    log("❌ setupDC error: " + err);
  }
}

// --- SIGNALING ---
async function host(){
  try {
    log("🚀 Host clicked");

    isHost=true;
    setup();

    log("📡 Creating data channel...");
    dc = pc.createDataChannel("g");
    setupDC();

    log("📝 Creating offer...");
    const offer = await pc.createOffer();

    log("📌 Setting local description...");
    await pc.setLocalDescription(offer);

    log("📤 Offer created, waiting ICE...");
  } catch (err) {
    log("❌ Host error: " + err);
  }
}

async function join(){
  try {
    log("🤝 Join clicked");
    setup();
  } catch(err){
    log("❌ Join error: " + err);
  }
}

async function processSignal(){
  try {
    const data = JSON.parse(input.value);

    if(data.type==="offer"){
      log("📥 Got offer");

      await pc.setRemoteDescription(data);

      log("📝 Creating answer...");
      const answer = await pc.createAnswer();

      await pc.setLocalDescription(answer);

      log("📤 Answer ready (copy it)");
    } else {
      log("📥 Got answer");
      await pc.setRemoteDescription(data);
    }
  } catch(err){
    log("❌ processSignal error: " + err);
  }
}

function copyOut(){
  navigator.clipboard.writeText(out.value);
  log("📋 Copied");
}
</script>

</body>
</html>
