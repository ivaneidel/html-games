<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pong Visual Link</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:monospace;
  overflow:hidden;
  text-align:center;
}
#ui { padding:15px; }
canvas { display:none; }
video { width:100%; display:none; }

#flash {
  width:100vw;
  height:50vh;
  display:none;
}

#log {
  position:fixed;
  bottom:0;
  width:100%;
  min-height:50px;
  max-height:200px;
  overflow:auto;
  background:#000;
  font-size:11px;
}
</style>
</head>
<body>

<div id="ui">
  <button onclick="host()">Host</button>
  <button onclick="join()">Join</button>
</div>

<div id="flash"></div>
<video id="cam" autoplay></video>
<canvas id="game"></canvas>
<div id="log"></div>

<script>
// --- LOG ---
const logEl = document.getElementById("log");
function log(msg){
  logEl.innerHTML += msg + "<br>";
  logEl.scrollTop = logEl.scrollHeight;
}

// --- ENCODING ---
function strToBits(str){
  return str.split("").map(c =>
    c.charCodeAt(0).toString(2).padStart(8,"0")
  ).join("");
}

function bitsToStr(bits){
  let out="";
  for(let i=0;i<bits.length;i+=8){
    out+=String.fromCharCode(parseInt(bits.slice(i,i+8),2));
  }
  return out;
}

// --- FLASH SEND ---
async function flashData(data){
  log("📤 Flashing data...");
  const bits = strToBits(data);

  const flash = document.getElementById("flash");
  flash.style.display="block";

  for(let i=0;i<bits.length;i++){
    flash.style.background = bits[i]==="1" ? "white" : "black";
    await sleep(30);
  }

  flash.style.display="none";
  log("✅ Flash done");
}

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms));
}

// --- CAMERA RECEIVE ---
async function receiveData(){
  log("📥 Starting camera decode");

  const video = document.getElementById("cam");
  video.style.display="block";

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject = stream;

  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  let bits="";
  let last=null;

  return new Promise(resolve=>{
    const loop = setInterval(()=>{
      if(video.videoWidth===0) return;

      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;
      ctx.drawImage(video,0,0);

      const img = ctx.getImageData(0,0,canvas.width,canvas.height);
      let sum=0;

      for(let i=0;i<img.data.length;i+=40){
        sum += img.data[i];
      }

      const bright = sum > (img.data.length*2);

      if(last!==bright){
        bits += bright ? "1" : "0";
        last = bright;
      }

      // crude stop condition
      if(bits.length > 20000){
        clearInterval(loop);
        video.srcObject.getTracks().forEach(t=>t.stop());
        video.style.display="none";

        log("📥 Bits received: "+bits.length);
        resolve(bitsToStr(bits));
      }

    },30);
  });
}

// --- WEBRTC ---
let pc, dc, isHost=false;

function setup(){
  pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  pc.ondatachannel = e=>{
    dc=e.channel;
    setupDC();
  };
}

function setupDC(){
  dc.onopen = ()=>{
    log("🟢 Connected!");
    startGame();
  };

  dc.onmessage = e=>{
    handle(JSON.parse(e.data));
  };
}

// --- HOST ---
async function host(){
  isHost=true;
  setup();

  dc = pc.createDataChannel("g");
  setupDC();

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await sleep(1000);

  await flashData(JSON.stringify(pc.localDescription));

  log("📡 Waiting for answer...");
  const answerStr = await receiveData();

  const answer = JSON.parse(answerStr);
  await pc.setRemoteDescription(answer);
}

// --- JOIN ---
async function join(){
  setup();

  const offerStr = await receiveData();
  const offer = JSON.parse(offerStr);

  await pc.setRemoteDescription(offer);

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  await sleep(1000);

  await flashData(JSON.stringify(pc.localDescription));
}

// --- GAME (same as before) ---
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let W,H;
let player={x:0};
let opponent={x:0};
let targetX=0;

let ball={x:0,y:0,vx:0,vy:0,speed:300};

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
}
addEventListener("resize",resize);

function startGame(){
  document.getElementById("ui").style.display="none";
  canvas.style.display="block";

  resize();
  player.x=W/2;
  opponent.x=W/2;

  if(isHost) resetBall();

  requestAnimationFrame(loop);
}

canvas.addEventListener("touchmove",e=>{
  const x=e.touches[0].clientX;
  player.x=x;
  send({t:"p",x});
});

function send(d){
  if(dc?.readyState==="open"){
    dc.send(JSON.stringify(d));
  }
}

function handle(d){
  if(d.t==="p") targetX=d.x;
  if(d.t==="b") ball=d.ball;
}

function resetBall(){
  ball.x=W/2;
  ball.y=H/2;

  const a=(Math.random()*Math.PI/3)-(Math.PI/6);
  const dir=Math.random()>0.5?1:-1;

  ball.vx=Math.sin(a);
  ball.vy=Math.cos(a)*dir;
}

function update(dt){
  opponent.x += (targetX - opponent.x)*10*dt;

  if(!isHost) return;

  ball.x+=ball.vx*ball.speed*dt;
  ball.y+=ball.vy*ball.speed*dt;

  if(ball.x<0||ball.x>W) ball.vx*=-1;

  if(ball.y>H-40 && Math.abs(ball.x-player.x)<60){
    ball.vy*=-1;
  }

  if(ball.y<40 && Math.abs(ball.x-opponent.x)<60){
    ball.vy*=-1;
  }

  send({t:"b",ball});
}

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle="white";

  ctx.fillRect(player.x-60,H-30,120,10);
  ctx.fillRect(opponent.x-60,20,120,10);

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
  ctx.fill();
}

let last=0;
function loop(t){
  const dt=(t-last)/1000;
  last=t;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
