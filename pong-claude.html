<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pong</title>
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;touch-action:none;font-family:monospace;color:#fff;}
  canvas{display:block;}
  #ui{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:rgba(0,0,0,0.96);padding:20px;box-sizing:border-box;}
  h1{margin:0;font-size:clamp(24px,6vw,40px);letter-spacing:6px;}
  .hint{margin:0;font-size:14px;opacity:0.6;text-align:center;max-width:280px;line-height:1.6;}
  button{background:#fff;color:#000;border:none;padding:14px 32px;font-family:monospace;font-size:16px;cursor:pointer;letter-spacing:2px;min-width:160px;}
  button:active{background:#bbb;}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  /* big room code display */
  #room-code{font-size:clamp(48px,15vw,80px);letter-spacing:12px;font-weight:bold;color:#fff;}
  /* PIN input */
  #pin-wrap{display:flex;gap:10px;justify-content:center;}
  .pin-digit{width:52px;height:68px;font-size:36px;text-align:center;background:#111;color:#fff;border:2px solid #555;font-family:monospace;border-radius:4px;caret-color:#fff;}
  .pin-digit:focus{border-color:#fff;outline:none;}
  .status{font-size:13px;opacity:0.7;text-align:center;}
  /* log */
  #log-wrap{position:fixed;bottom:0;left:0;right:0;max-height:28vh;overflow-y:auto;background:rgba(0,0,0,0.92);border-top:1px solid #222;font-size:10px;padding:4px 6px;box-sizing:border-box;z-index:9999;display:none;}
  #log-wrap .e{padding:1px 0;word-break:break-all;border-bottom:1px solid #111;}
  .err{color:#f66;}.ok{color:#6f6;}.info{color:#adf;}
  #log-btn{position:fixed;bottom:4px;right:4px;z-index:10000;background:#222;color:#555;border:none;font-size:10px;padding:3px 7px;cursor:pointer;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="ui">
  <h1>PONG</h1>

  <!-- HOME -->
  <div id="s-home" style="display:flex;flex-direction:column;align-items:center;gap:16px;">
    <div class="btn-row">
      <button id="btn-host">HOST</button>
      <button id="btn-join">JOIN</button>
    </div>
  </div>

  <!-- HOST: show room code -->
  <div id="s-host" style="display:none;flex-direction:column;align-items:center;gap:12px;">
    <p class="hint">Give this code to the other player</p>
    <div id="room-code">····</div>
    <div id="st-host" class="status">Connecting to server…</div>
  </div>

  <!-- JOIN: enter room code -->
  <div id="s-join" style="display:none;flex-direction:column;align-items:center;gap:16px;">
    <p class="hint">Enter the host's 4-digit code</p>
    <div id="pin-wrap">
      <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
    </div>
    <button id="btn-connect">CONNECT</button>
    <div id="st-join" class="status"></div>
  </div>
</div>

<div id="log-wrap"></div>
<button id="log-btn" onclick="toggleLog()">LOG</button>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ── Log ───────────────────────────────────────────────────────────────────────
const logWrap = document.getElementById("log-wrap");
let logVis = false;
function toggleLog(){ logVis=!logVis; logWrap.style.display=logVis?"block":"none"; }
function log(m,t="info"){
  console.log(m);
  const d=document.createElement("div");
  d.className="e "+t;
  d.textContent=new Date().toISOString().substr(11,8)+" "+m;
  logWrap.appendChild(d); logWrap.scrollTop=logWrap.scrollHeight;
}
window.onerror=(m,s,l)=>log("ERR:"+m+" "+s+":"+l,"err");
window.onunhandledrejection=e=>log("PROMISE:"+(e.reason?.message||e.reason),"err");

// ── UI helpers ────────────────────────────────────────────────────────────────
function showScreen(id){
  ["s-home","s-host","s-join"].forEach(s=>document.getElementById(s).style.display="none");
  document.getElementById(id).style.display="flex";
}
function hideUI(){ document.getElementById("ui").style.display="none"; }
function setEl(id,t){ const e=document.getElementById(id); if(e) e.textContent=t; }

// ── PIN input wiring ──────────────────────────────────────────────────────────
const digits = Array.from(document.querySelectorAll(".pin-digit"));
digits.forEach((d,i)=>{
  d.addEventListener("input",()=>{
    d.value=d.value.replace(/\D/g,"").slice(-1);
    if(d.value && i<3) digits[i+1].focus();
  });
  d.addEventListener("keydown",e=>{
    if(e.key==="Backspace"&&!d.value&&i>0) digits[i-1].focus();
  });
});
function getPin(){ return digits.map(d=>d.value).join(""); }

// ── PeerJS ────────────────────────────────────────────────────────────────────
let peer = null, conn = null, role = null;

function randomCode(){
  return String(Math.floor(1000+Math.random()*9000));
}

function initPeer(id){
  return new Promise((res,rej)=>{
    log("creating Peer id="+id);
    const p = new Peer(id, { debug: 0 });
    p.on("open", id=>{ log("peer open id="+id,"ok"); res(p); });
    p.on("error", e=>{ log("peer error: "+e.message||e,"err"); rej(e); });
  });
}

// ── HOST ──────────────────────────────────────────────────────────────────────
async function startHost(){
  role="host"; showScreen("s-host");
  const code = randomCode();
  setEl("room-code", code);
  setEl("st-host","Connecting to server…");

  try {
    peer = await initPeer("pong-host-"+code);
    setEl("st-host","Waiting for player 2…");
    log("host waiting on code "+code,"ok");

    peer.on("connection", c=>{
      log("incoming connection from "+c.peer,"ok");
      conn = c;
      setupConn(conn);
    });
  } catch(e){
    setEl("st-host","Server error: "+e.message);
  }
}

// ── GUEST ─────────────────────────────────────────────────────────────────────
async function startJoin(){
  role="guest"; showScreen("s-join");
  setTimeout(()=>digits[0].focus(), 100);
}

async function connectToHost(){
  const code = getPin();
  if(code.length<4){ setEl("st-join","Enter all 4 digits"); return; }
  setEl("st-join","Connecting…");
  log("guest connecting to code "+code);

  try {
    peer = await initPeer(undefined); // random id for guest
    conn = peer.connect("pong-host-"+code, { reliable:true });

    conn.on("open",()=>{
      log("guest connection open","ok");
      setupConn(conn);
    });
    conn.on("error",e=>{ log("conn err: "+e,"err"); setEl("st-join","Connection failed"); });

    setTimeout(()=>{
      if(!gameRunning) setEl("st-join","Couldn't reach host. Check the code.");
    }, 8000);
  } catch(e){
    setEl("st-join","Error: "+e.message);
  }
}

// ── Data connection ───────────────────────────────────────────────────────────
function setupConn(c){
  log("setupConn, open="+c.open);

  function onOpen(){
    log("conn open!","ok");
    hideUI(); initState(); myX=W/2; gameRunning=true;
  }

  // "open" may have already fired by the time we get here
  if(c.open) onOpen();
  else c.on("open", onOpen);

  c.on("data", msg=>{
    if(msg.type==="state" && role==="guest"){
      const s=msg.state;
      state.guest.x=s.guest.x; state.host.x=s.host.x;
      state.score={host:s.score.guest, guest:s.score.host};
      state.ball.x=s.ball.x; state.ball.y=H-s.ball.y;
      state.paused=s.paused; gameResult="";
      if(s.paused&&s.score.host>=MAX_SCORE)  gameResult="guest";
      if(s.paused&&s.score.guest>=MAX_SCORE) gameResult="host";
      const t={...state.host}; state.host={...state.guest}; state.guest=t;
    } else if(msg.type==="input" && role==="host"){
      state.guest.x=msg.x;
    }
  });
  c.on("close", ()=>{ log("conn closed","err"); });
  c.on("error", e=>{ log("conn error: "+e,"err"); });
}

// ── Button wiring ─────────────────────────────────────────────────────────────
document.getElementById("btn-host").onclick = startHost;
document.getElementById("btn-join").onclick  = startJoin;
document.getElementById("btn-connect").onclick = connectToHost;

// ── Game ──────────────────────────────────────────────────────────────────────
const canvas=document.getElementById("game"), ctx=canvas.getContext("2d");
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener("resize",resize); resize();

const MAX_SCORE=5, PAD={w:120,h:12,margin:30};
let gameRunning=false, gameResult="";
let state={ball:{x:0,y:0},host:{x:0},guest:{x:0},score:{host:0,guest:0},paused:true};
let myX=0, ballSpeed=300, ballVx=0, ballVy=0;

function initState(){
  state.ball.x=W/2; state.ball.y=H/2;
  state.host.x=W/2; state.guest.x=W/2;
  state.score={host:0,guest:0};
  ballSpeed=300; myX=W/2; serveBall();
}
function serveBall(){
  const a=(Math.random()*Math.PI/3)-Math.PI/6, d=Math.random()>.5?1:-1;
  ballVx=Math.sin(a); ballVy=Math.cos(a)*d;
  state.ball.x=W/2; state.ball.y=H/2;
  ballSpeed=300;
  state.paused=true; setTimeout(()=>{state.paused=false;},800);
}
function hostUpdate(dt){
  if(state.paused)return;
  state.ball.x+=ballVx*ballSpeed*dt; state.ball.y+=ballVy*ballSpeed*dt;
  if(state.ball.x<0||state.ball.x>W) ballVx*=-1;
  if(state.ball.y>H-PAD.margin-PAD.h&&Math.abs(state.ball.x-state.host.x)<PAD.w/2) hitPad(state.host.x,-1);
  if(state.ball.y<PAD.margin+PAD.h&&Math.abs(state.ball.x-state.guest.x)<PAD.w/2) hitPad(state.guest.x,1);
  if(state.ball.y<0){state.score.host++;checkWin();serveBall();}
  if(state.ball.y>H){state.score.guest++;checkWin();serveBall();}
}
function hitPad(px,dir){
  const o=(state.ball.x-px)/(PAD.w/2);
  ballSpeed=Math.min(ballSpeed*1.05,900);
  ballVx=Math.sin(o*Math.PI/3); ballVy=Math.cos(o*Math.PI/3)*dir;
  if(navigator.vibrate) navigator.vibrate(10);
}
function checkWin(){
  if(state.score.host>=MAX_SCORE||state.score.guest>=MAX_SCORE){
    state.paused=true;
    gameResult=state.score.host>=MAX_SCORE?"host":"guest";
    setTimeout(()=>{gameResult="";initState();},2000);
  }
}
function draw(){
  ctx.fillStyle="#000"; ctx.fillRect(0,0,W,H);
  if(!gameRunning)return;
  ctx.fillStyle="#fff";
  ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2);
  ctx.strokeStyle="#fff"; ctx.stroke(); ctx.setLineDash([]);
  ctx.fillRect(state.host.x-PAD.w/2,H-PAD.margin-PAD.h,PAD.w,PAD.h);
  ctx.fillRect(state.guest.x-PAD.w/2,PAD.margin,PAD.w,PAD.h);
  ctx.beginPath(); ctx.arc(state.ball.x,state.ball.y,8,0,Math.PI*2); ctx.fill();
  ctx.font="20px monospace"; ctx.textAlign="center";
  ctx.fillText(state.score.guest,W/2,40);
  ctx.fillText(state.score.host,W/2,H-20);
  if(gameResult){
    const w=(role==="host"&&gameResult==="host")||(role==="guest"&&gameResult==="guest");
    ctx.font="bold 28px monospace";
    ctx.fillText(w?"YOU WIN!":"YOU LOSE",W/2,H/2);
  }
}
let lastTime=0;
function loop(t){
  const dt=Math.min((t-lastTime)/1000,0.05); lastTime=t;
  if(gameRunning&&role==="host"){
    state.host.x=myX; hostUpdate(dt);
    if(conn&&conn.open) conn.send({type:"state",state,ballVx,ballVy,ballSpeed});
  }
  draw(); requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

canvas.addEventListener("touchstart",e=>moveMe(e.touches[0].clientX));
canvas.addEventListener("touchmove", e=>moveMe(e.touches[0].clientX));
canvas.addEventListener("mousemove", e=>moveMe(e.clientX));
function moveMe(x){
  if(!gameRunning)return;
  myX=clamp(x,PAD.w/2,W-PAD.w/2);
  if(role==="guest"&&conn&&conn.open) conn.send({type:"input",x:myX});
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

log("ready | PeerJS="+(typeof Peer));
</script>
</body>
</html>
